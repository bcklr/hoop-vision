<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, inital-scale 1.0"/>
    <title>Hoop Vision</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>


    <div class="app">


      <header>
        <div class="header-top">
          <h1 class="logo">
            <span class="logo-hoop">HOOP</span>
            <span class="logo-vision">VISION</span>
          </h1>
          <p class="tagline">NBA Games & Player Tracker</p>
        </div>
      </header>

      <div class="search-section">
        <div class="search-bar">
          <input
            type="text"
            id="team-search"
            placeholder="Search a team..."
            autocomplete="off"
            />
          <button id="search-btn">SEARCH</button>
        </div>
        <div class+"search-results hidden" id="search-results"></div>
      </div>



      <div class="team-header hidden" id="team-header">
        <h2 id="team-name">Team Name</h2>
        <p id="team-meta"></p>
      </div>



      <div class="section hidden" id="games-section">
        <h3 class="section-title">RECENT GAMES</h3>
        <div class="games-list" id="games-list"></div>
      </div>



      <div class="section hidden" id="game-detail-section">
        <button class="back-btn" id="back-to-games">← Back to Games</button>
        <div class="game-detail-header" id="game-detail-header"></div>
        <h3 class="section-title">BOX SCORE</h3>
        <div class="box-score" id="box-score"></div>
      </div>


      <div class="player-card hidden" id="player-card">
        <div class="player-card-header">
          <div class="player-avatar" id="player-avatar">
            <span id="player-intials">??</span>
          </div>
        <div class="player-card-info">
          <h4 id="card-player-name">Player Name</h4>
          <p id="card-player-team">Team</p>
          <p id-"card-player-pos">Position</p>
        </div>
        </div>
        <div class="players-stats-grid"?
          <div class="stat-box">
          <span class="stat-value" id="card-reb">0</span>
          <span class="stat-label">PTS</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="card-reb">0</span>
          <span class="stat-label">REB</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="card-ast">0</span>
          <span class="stat-label">AST</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="card-stl">0</span>
          <span class="stat-label">STL</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="card-blk">0</span>
          <span class="stat-label">BLK</span>
        </div>
        <div class="stat-box">
          <span class="stat-value" id="card-min">0</span>
          <span class="stat-label">MIN</span>
        </div>
      </div>
    </div>

  </div>

    <script src="script.js"></script>
   </body>
</html>
